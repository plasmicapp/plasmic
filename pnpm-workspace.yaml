# PNPM workspace for packages/ and plasmicpkgs/
packages:
  - packages/*
  # Deprecated stub packages with no version
  - "!packages/loader-angular"
  - "!packages/loader-svelte"
  - "!packages/loader-vue"
  - "!packages/plasmic"
  - plasmicpkgs/*
  - plasmicpkgs/commerce-providers/*
  - plasmicpkgs-dev

overrides:
  eslint: "^8.55.0"
  jest: "29.7.0"
  sha.js: "^2.4.12"
  "@babel/core": "^7.29.0"
  "@babel/types": "^7.29.0"
  "@babel/traverse": "^7.29.0"
  "@babel/generator": "^7.29.0"
  "@babel/parser": "^7.29.0"
  "@babel/helpers": "^7.29.0"
  "@types/minimatch": "3.0.5"
  typescript: "5.2.2"
  "picomatch@2": "2.3.1"
  "antd@5": "5.12.8"
  "@radix-ui/react-popper": "1.1.3"
  "lottie-web": ">=5.13.0"
  # storybook-addon-mock@5 declares its @storybook/* shim deps as ^8.0.8, which a
  # fresh pnpm resolve bumps to 8.6.x while we pin storybook core at 8.5.5. The
  # 8.6.x shims import "storybook/internal/csf", a subpath storybook@8.5.5 does
  # not export, breaking the storybook build. Pin the shims to match core.
  "@storybook/blocks": "8.5.5"
  "@storybook/channels": "8.5.5"
  "@storybook/components": "8.5.5"
  "@storybook/core-events": "8.5.5"
  "@storybook/manager-api": "8.5.5"
  "@storybook/preview-api": "8.5.5"
  "@storybook/theming": "8.5.5"
  react: "18.3.1"
  react-dom: "18.3.1"

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  core-js-pure: true
  es5-ext: true
  esbuild: false
  gatsby: true
  gatsby-cli: true
  lmdb: true
  msgpackr-extract: true
  msw: true
  nx: true
  sharp: true
  unrs-resolver: true

shamefullyHoist: true
# Link local workspace packages even when referenced by plain version range.
linkWorkspacePackages: deep
preferWorkspacePackages: true

# pnpm 11 defaults minimumReleaseAge to 1440 min.
# Remove this for some degree of supply chain attack resistance
minimumReleaseAge: 0
